
<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Professional Piano | Playable Keyboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="piano-container">
    <div class="piano" id="pianoKeyboard">
        <!-- White & Black keys will be dynamically generated via JS but preserve structural logic -->
    </div>
    <div class="info-panel">
        <div class="title-logo">
            <img class="logo-icon" src="fnlst.jpg" alt="freeCodeCamp">
            <h3>🎹 Playable Piano · Click or Type Keys</h3>
        </div>
        <div class="hotkey-info">
            <div class="hotkey-badge">🎵 White Keys: <span>A S D F G H J K L ; '</span></div>
            <div class="hotkey-badge">⚫ Black Keys: <span>W E   T Y U   O P</span></div>
            <button class="reset-btn" id="resetActiveNotes">⟳ Reset Sounds</button>
        </div>
    </div>
</div>

<script src="scripts.js"></script>
</body>
</html>
